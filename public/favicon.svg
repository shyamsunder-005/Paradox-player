<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
  </defs>
  <!-- Background mimicking bg-gradient-to-tr from-brand to-brand-hover rounded-2xl -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Lucide Disc Icon centered, color text-bg-primary (#050507) -->
  <g transform="translate(96, 96) scale(13.3333)" fill="none" stroke="#050507" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10" />
    <circle cx="12" cy="12" r="2" />
  </g>
</svg>
